<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rolador de Dados — RPG</title>
<style>
  :root {
    --bg: #14110f;
    --panel: #1e1a16;
    --panel-2: #26211c;
    --line: #3a322a;
    --txt: #e8ddcc;
    --muted: #9c8d78;
    --accent: #c4622d;
    --accent-2: #d98a3d;
    --crit-hi: #4caf6d;
    --crit-lo: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: radial-gradient(circle at 50% 0%, #221d18 0%, var(--bg) 60%);
    color: var(--txt);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  h1 {
    font-size: 1.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-2);
    margin-bottom: 4px;
    text-align: center;
  }

  .sub {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 1px;
    margin-bottom: 28px;
    text-align: center;
  }

  .grid { display: flex; flex-direction: column; gap: 40px; align-items: center; }
  .block { width: 640px; }

  .main { display: flex; gap: 22px; width: 100%; align-items: flex-start; }
  .left-col { flex: 1 1 auto; min-width: 0; }
  .right-col { flex: 0 0 auto; }

  /* Caixa de resultado */
  .result-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    margin-bottom: 18px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4) inset, 0 0 0 1px rgba(0,0,0,0.2);
  }
  .result-die {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
    min-height: 1.1em;
  }
  .result-value {
    font-size: 3rem;
    font-weight: bold;
    line-height: 1;
    color: var(--accent-2);
    transition: transform 0.12s ease;
  }
  .result-value.roll-anim { transform: scale(1.18); }
  .result-value.crit-hi { color: var(--crit-hi); }
  .result-value.crit-lo { color: var(--crit-lo); }

  .crit-label {
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
    min-height: 1em;
  }
  .crit-label.hi { color: var(--crit-hi); }
  .crit-label.lo { color: var(--crit-lo); }

  /* Botões dos dados */
  .dice { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; }
  .die-btn {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line);
    color: var(--txt);
    font-family: Georgia, serif;
    font-size: 1.2rem;
    font-weight: bold;
    padding: 10px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.08s ease, border-color 0.2s, background 0.2s, opacity 0.2s;
    letter-spacing: 1px;
  }
  .die-btn:hover { border-color: var(--accent); background: linear-gradient(180deg, #322a22, var(--panel-2)); }
  .die-btn:active { transform: translateY(2px) scale(0.97); }
  .die-btn.locked { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

  /* Painel de controles */
  .controls { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
  .ctrl-row { display: flex; align-items: center; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .ctrl-row label { font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }

  .num-input {
    width: 70px;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--txt);
    font-family: Georgia, serif;
    font-size: 1.1rem;
    font-weight: bold;
    text-align: center;
    padding: 8px 6px;
    border-radius: 6px;
  }
  .num-input:focus { outline: none; border-color: var(--accent); }
  .num-input:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Checkbox */
  .toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .toggle input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .toggle span { font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }

  /* Condição (modo contador) */
  .cond-row.disabled { opacity: 0.35; pointer-events: none; }
  .op-select {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--txt);
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1.15rem;
    font-weight: bold;
    text-align: center;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
  .op-select:focus { outline: none; border-color: var(--accent); }
  .op-select:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ===== Modo Combate ===== */
  .combat-row.disabled { opacity: 0.35; pointer-events: none; }

  /* Toggle switch Ataque / Defesa */
  .switch {
    display: inline-flex;
    align-items: center;
    border: 1px solid var(--line);
    border-radius: 999px;
    overflow: hidden;
    font-size: 0.78rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
  }
  .switch button {
    background: var(--panel);
    border: none;
    color: var(--muted);
    font-family: Georgia, serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 0.78rem;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .switch button.active { background: var(--accent); color: #14110f; font-weight: bold; }

  /* Stepper de bônus de dados */
  .stepper { display: inline-flex; align-items: center; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .stepper button {
    background: var(--panel);
    border: none;
    color: var(--accent-2);
    font-family: Georgia, serif;
    font-size: 1.2rem;
    font-weight: bold;
    width: 34px;
    padding: 6px 0;
    cursor: pointer;
    transition: background 0.2s;
  }
  .stepper button:hover { background: var(--panel-2); }
  .stepper .step-val {
    min-width: 44px;
    text-align: center;
    font-size: 1.05rem;
    font-weight: bold;
    color: var(--txt);
    padding: 0 4px;
  }

  /* Histórico */
  .hist-wrap { display: flex; flex-direction: column; width: 210px; }
  .hist-head { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 10px; }
  .hist-head h2 { font-size: 0.85rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: normal; }
  .clear-btn {
    background: none; border: 1px solid var(--line); color: var(--muted);
    font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 8px; border-radius: 5px; cursor: pointer; font-family: Georgia, serif;
  }
  .clear-btn:hover { border-color: var(--crit-lo); color: var(--crit-lo); }

  .history {
    list-style: none;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    height: 300px;
    min-height: 90px;
    min-width: 160px;
    overflow: auto;
    resize: both;
    padding: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }
  .history::-webkit-scrollbar { width: 6px; height: 6px; }
  .history::-webkit-scrollbar-track { background: transparent; }
  .history::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
  .history::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  .history::-webkit-scrollbar-corner { background: transparent; }

  .history li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-bottom: 1px solid rgba(58,50,42,0.5);
    font-size: 0.9rem;
  }
  .history li:nth-child(odd) { background: rgba(255,255,255,0.015); }

  .history li.group-head {
    justify-content: center;
    color: var(--accent);
    font-size: 0.72rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(196,98,45,0.08);
    border-bottom: 1px solid var(--line);
  }

  /* Linha de combate no histórico: face + texto */
  .history li.combat-line { flex-direction: column; align-items: flex-start; gap: 2px; }
  .history li.combat-line .cl-top { display: flex; justify-content: space-between; width: 100%; align-items: center; }
  .cl-text { font-size: 0.78rem; color: var(--muted); }
  .cl-text.hi { color: var(--crit-hi); }
  .cl-text.lo { color: var(--crit-lo); }

  .h-die { color: var(--muted); letter-spacing: 1px; font-size: 0.85rem; }
  .h-val { font-weight: bold; font-size: 1.05rem; color: var(--accent-2); }
  .h-val.hi { color: var(--crit-hi); }
  .h-val.lo { color: var(--crit-lo); }
  .h-time { color: #6f6253; font-size: 0.7rem; }

  .empty { color: #6f6253; text-align: center; padding: 18px 10px; font-style: italic; font-size: 0.85rem; }
</style>
</head>
<body>

  <h1>Rolador de Dados</h1>
  <div class="sub">Histórico mantido durante a sessão · recarregar limpa tudo</div>

  <div class="grid">

    <div class="block">
      <div class="main">
        <div class="left-col">
          <div class="result-box">
            <div class="result-die" data-role="resultDie">Escolha um dado</div>
            <div class="result-value" data-role="resultValue">—</div>
            <div class="crit-label" data-role="critLabel"></div>
          </div>

          <div class="dice" data-role="dice"></div>

          <div class="controls">
            <div class="ctrl-row">
              <label for="qty">Qtd. de roladas</label>
              <input type="number" id="qty" class="num-input" data-role="qty" min="1" max="100" value="1">
            </div>

            <div class="ctrl-row">
              <label class="toggle">
                <input type="checkbox" data-role="counterToggle">
                <span>Contador</span>
              </label>
              <label class="toggle">
                <input type="checkbox" data-role="combatToggle">
                <span>Combate</span>
              </label>
            </div>

            <!-- Condição (contador) -->
            <div class="ctrl-row cond-row disabled" data-role="condRow">
              <label>Condição: dado</label>
              <select class="op-select" data-role="op" disabled>
                <option value="==">==</option>
                <option value="!=">!=</option>
                <option value="&gt;">&gt;</option>
                <option value="&gt;=">&gt;=</option>
                <option value="&lt;" selected>&lt;</option>
                <option value="&lt;=">&lt;=</option>
              </select>
              <input type="number" class="num-input" data-role="condVal" value="5" disabled>
            </div>

            <!-- Combate -->
            <div class="ctrl-row combat-row disabled" data-role="combatRow">
              <div class="switch" data-role="switch">
                <button type="button" class="active" data-mode="atk">Ataque</button>
                <button type="button" data-mode="def">Defesa</button>
              </div>
              <label>Dados</label>
              <div class="stepper">
                <button type="button" data-role="stepDown">−</button>
                <span class="step-val" data-role="stepVal">0</span>
                <button type="button" data-role="stepUp">+</button>
              </div>
              <label>Crítico</label>
              <div class="stepper">
                <button type="button" data-role="critDown">−</button>
                <span class="step-val" data-role="critVal">0</span>
                <button type="button" data-role="critUp">+</button>
              </div>
            </div>
          </div>
        </div>

        <div class="right-col">
          <div class="hist-wrap">
            <div class="hist-head">
              <h2>Histórico</h2>
              <button class="clear-btn" data-role="clearBtn">Limpar</button>
            </div>
            <ul class="history" data-role="history">
              <li class="empty">Nenhuma rolagem ainda.</li>
            </ul>
          </div>
        </div>
      </div>
    </div>

  </div>

<script>
  const DICE = [2, 4, 6, 8, 10, 12, 20, 100];

  /* ===== Crítico padrão (fora do combate) =====
     D20 -> acerto crítico no 1 (sem erro crítico)
     D6  -> acerto crítico no 6, erro crítico no 1 */
  function getCrit(sides, value) {
    if (sides === 20) { if (value === 1) return 'hi'; }
    else if (sides === 6) { if (value === 6) return 'hi'; if (value === 1) return 'lo'; }
    return null;
  }
  function critText(crit) {
    return crit === 'hi' ? 'Acerto Crítico!' : crit === 'lo' ? 'Falha Crítica!' : '';
  }

  /* ===== Condição (modo contador), operadores estilo C# ===== */
  function passesCondition(value, op, target) {
    switch (op) {
      case '==': return value === target;
      case '!=': return value !== target;
      case '>':  return value >  target;
      case '>=': return value >= target;
      case '<':  return value <  target;
      case '<=': return value <= target;
      default:   return false;
    }
  }

  /* ===== Combate Opevere =====
     Bônus PURO (+) promove as falhas mais altas para o acerto-de-borda.
     Penalidade PURA (-) rebaixa os acertos mais baixos para falha.
     Bônus de CRÍTICO (+) promove os acertos mais altos (abaixo do 6) para crítico.
       - só sobe (0..+3); na defesa, o contra-ataque (+1 turno) fica só no 6 natural.
     Ordem: aplica o puro primeiro, depois o de crítico.
     O 1 só é "falha crítica" enquanto ainda for falha. */
  const ATK_BASE = ['FA','FA','MIN','MED','MAX','CRIT'];
  const DEF_BASE = ['FA','FA','FA','DEF','DEFC','DEFCR'];
  const FAIL = new Set(['FA','FC']);
  const PROMOTE_PURE = { atk: 'MIN', def: 'DEF' };
  const PROMOTE_CRIT = { atk: 'CRIT', def: 'DEFCR_NC' }; // crítico promovido (defesa SEM contra-ataque)
  const ALREADY_CRIT = { atk: new Set(['CRIT']), def: new Set(['DEFCR','DEFCR_NC']) };
  const COMBAT_TEXT = {
    FC:      'Falha Crítica',
    FA:      'Falha',
    MIN:     'Acerta Dano Mínimo',
    MED:     'Acerta Dano Médio',
    MAX:     'Acerta Dano Máximo',
    CRIT:    'Acerta Dano Crítico',
    DEF:     'Defende Ataques Normais',
    DEFC:    'Defende Ataques Normais e Críticos',
    DEFCR:   'Defesa Crítica (+1 turno)',
    DEFCR_NC:'Defesa Crítica (sem contra-ataque)',
  };
  // resultados que ganham cor verde (críticos bons); vermelho fica na falha crítica
  const GOOD = new Set(['CRIT','DEFCR','DEFCR_NC']);

  function buildCombatTable(mode, level, critLevel) {
    let t = (mode === 'atk' ? ATK_BASE : DEF_BASE).slice();
    // 1) bônus/penalidade PURO
    if (level > 0) {
      let n = level;
      for (let i = t.length - 1; i >= 0 && n > 0; i--) {
        if (FAIL.has(t[i])) { t[i] = PROMOTE_PURE[mode]; n--; }
      }
    } else if (level < 0) {
      let n = -level;
      for (let i = 0; i < t.length && n > 0; i++) {
        if (!FAIL.has(t[i])) { t[i] = 'FA'; n--; }
      }
    }
    // 2) bônus de CRÍTICO (só sobe): promove os acertos comuns mais altos (abaixo do 6) para crítico
    if (critLevel > 0) {
      let n = critLevel;
      for (let i = t.length - 1; i >= 0 && n > 0; i--) {
        if (i === 5) continue;                  // o 6 é o crítico natural, não conta como "promovido"
        if (FAIL.has(t[i])) continue;           // não promove falha
        if (ALREADY_CRIT[mode].has(t[i])) continue; // já é crítico
        t[i] = PROMOTE_CRIT[mode];
        n--;
      }
    }
    // falha crítica só no 1, e só se ainda for falha
    if (FAIL.has(t[0])) t[0] = 'FC';
    for (let i = 1; i < t.length; i++) { if (t[i] === 'FC') t[i] = 'FA'; }
    return t;
  }
  // tom de cor pra um código de combate
  function combatTone(code) {
    if (GOOD.has(code)) return 'hi';
    if (code === 'FC') return 'lo';
    return null;
  }

  function nowTime() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  document.querySelectorAll('.block').forEach(block => {
    const diceEl       = block.querySelector('[data-role="dice"]');
    const resultDie    = block.querySelector('[data-role="resultDie"]');
    const resultVal    = block.querySelector('[data-role="resultValue"]');
    const critLabel    = block.querySelector('[data-role="critLabel"]');
    const historyEl    = block.querySelector('[data-role="history"]');
    const clearBtn     = block.querySelector('[data-role="clearBtn"]');
    const qtyInput     = block.querySelector('[data-role="qty"]');
    const counterTgl   = block.querySelector('[data-role="counterToggle"]');
    const combatTgl    = block.querySelector('[data-role="combatToggle"]');
    const condRow      = block.querySelector('[data-role="condRow"]');
    const opSelect     = block.querySelector('[data-role="op"]');
    const condValInput = block.querySelector('[data-role="condVal"]');
    const combatRow    = block.querySelector('[data-role="combatRow"]');
    const switchEl     = block.querySelector('[data-role="switch"]');
    const stepValEl    = block.querySelector('[data-role="stepVal"]');
    const stepUp       = block.querySelector('[data-role="stepUp"]');
    const stepDown     = block.querySelector('[data-role="stepDown"]');
    const critValEl    = block.querySelector('[data-role="critVal"]');
    const critUp       = block.querySelector('[data-role="critUp"]');
    const critDown     = block.querySelector('[data-role="critDown"]');
    const dieButtons   = []; // preenchido ao criar

    let combatMode = 'atk';   // 'atk' | 'def'
    // Cada modo guarda seus próprios bônus (memória independente)
    const combatState = {
      atk: { pure: 0, crit: 0 },  // puro: -3..+3 | crit: 0..+3
      def: { pure: 0, crit: 0 },
    };

    function clearEmptyMsg() {
      const empty = historyEl.querySelector('.empty');
      if (empty) empty.remove();
    }

    // Sincroniza a interface conforme os modos
    function syncUI() {
      const counterOn = counterTgl.checked;
      const combatOn  = combatTgl.checked;

      // condição liga só no contador
      opSelect.disabled = !counterOn;
      condValInput.disabled = !counterOn;
      condRow.classList.toggle('disabled', !counterOn);

      // combate liga só no combate
      combatRow.classList.toggle('disabled', !combatOn);

      // no combate: trava todos os dados menos o D6
      dieButtons.forEach(btn => {
        const isD6 = parseInt(btn.dataset.sides, 10) === 6;
        btn.classList.toggle('locked', combatOn && !isD6);
      });
    }

    // exclusividade dos checkboxes
    counterTgl.addEventListener('change', () => {
      if (counterTgl.checked) combatTgl.checked = false;
      syncUI();
    });
    combatTgl.addEventListener('change', () => {
      if (combatTgl.checked) counterTgl.checked = false;
      syncUI();
    });

    // switch ataque/defesa (cada modo tem seus próprios valores)
    switchEl.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        combatMode = b.dataset.mode;
        switchEl.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
        renderStep();
        renderCrit();
      });
    });

    // stepper de bônus puro (-3..+3) — atua no modo ativo
    function renderStep() { stepValEl.textContent = (combatState[combatMode].pure > 0 ? '+' : '') + combatState[combatMode].pure; }
    stepUp.addEventListener('click',   () => { const s = combatState[combatMode]; if (s.pure < 3)  { s.pure++; renderStep(); } });
    stepDown.addEventListener('click', () => { const s = combatState[combatMode]; if (s.pure > -3) { s.pure--; renderStep(); } });
    renderStep();

    // stepper de crítico (0..+3, só sobe) — atua no modo ativo
    function renderCrit() { critValEl.textContent = (combatState[combatMode].crit > 0 ? '+' : '') + combatState[combatMode].crit; }
    critUp.addEventListener('click',   () => { const s = combatState[combatMode]; if (s.crit < 3) { s.crit++; renderCrit(); } });
    critDown.addEventListener('click', () => { const s = combatState[combatMode]; if (s.crit > 0) { s.crit--; renderCrit(); } });
    renderCrit();

    function readQty() {
      let q = parseInt(qtyInput.value, 10);
      if (isNaN(q) || q < 1) q = 1;
      if (q > 100) q = 100;
      qtyInput.value = q;
      return q;
    }

    function addGroupHead(text) {
      clearEmptyMsg();
      const li = document.createElement('li');
      li.className = 'group-head';
      li.textContent = text;
      historyEl.insertBefore(li, historyEl.firstChild);
      return li;
    }

    function addHistoryLine(sides, value, tone, beforeNode) {
      clearEmptyMsg();
      const li = document.createElement('li');
      li.innerHTML =
        '<span class="h-die">D' + sides + '</span>' +
        '<span class="h-val' + (tone ? ' ' + tone : '') + '">' + value + '</span>' +
        '<span class="h-time">' + nowTime() + '</span>';
      historyEl.insertBefore(li, beforeNode || historyEl.firstChild);
    }

    // linha de combate: face em cima, texto traduzido embaixo
    function addCombatLine(value, code, beforeNode) {
      clearEmptyMsg();
      const tone = combatTone(code);
      const li = document.createElement('li');
      li.className = 'combat-line';
      li.innerHTML =
        '<div class="cl-top">' +
          '<span class="h-die">D6</span>' +
          '<span class="h-val' + (tone ? ' ' + tone : '') + '">' + value + '</span>' +
          '<span class="h-time">' + nowTime() + '</span>' +
        '</div>' +
        '<span class="cl-text' + (tone ? ' ' + tone : '') + '">' + COMBAT_TEXT[code] + '</span>';
      historyEl.insertBefore(li, beforeNode || historyEl.firstChild);
    }

    function roll(sides) {
      const qty = readQty();
      const isCounter = counterTgl.checked;
      const isCombat  = combatTgl.checked;

      // gera as roladas
      const rolls = [];
      for (let i = 0; i < qty; i++) rolls.push(Math.floor(Math.random() * sides) + 1);

      if (isCombat) {
        // só o D6 chega aqui (os outros estão travados), mas garantimos:
        if (sides !== 6) return;
        const diceBonus = combatState[combatMode].pure;
        const critBonus = combatState[combatMode].crit;
        const table = buildCombatTable(combatMode, diceBonus, critBonus);
        const label = combatMode === 'atk' ? 'ATAQUE' : 'DEFESA';
        const parts = [];
        if (diceBonus !== 0) parts.push((diceBonus > 0 ? '+' : '') + diceBonus + ' dado' + (Math.abs(diceBonus) > 1 ? 's' : ''));
        if (critBonus !== 0) parts.push('+' + critBonus + ' crít');
        const bonusTxt = parts.length ? ' (' + parts.join(', ') + ')' : '';

        if (qty === 1) {
          const v = rolls[0];
          const code = table[v - 1];
          const tone = combatTone(code);
          resultDie.textContent = 'D6 — ' + label + bonusTxt;
          resultVal.textContent = v;
          resultVal.className = 'result-value roll-anim' + (tone ? ' crit-' + tone : '');
          critLabel.className = 'crit-label' + (tone ? ' ' + tone : '');
          critLabel.textContent = COMBAT_TEXT[code];
          addCombatLine(v, code);
        } else {
          // várias roladas de combate: mostrador resume, histórico detalha
          resultDie.textContent = qty + 'x D6 — ' + label + bonusTxt;
          resultVal.textContent = qty + ' rolada' + (qty > 1 ? 's' : '');
          resultVal.className = 'result-value roll-anim';
          critLabel.className = 'crit-label';
          critLabel.textContent = '';
          const head = addGroupHead(qty + 'x D6 — ' + label + bonusTxt);
          for (let i = 0; i < rolls.length; i++) {
            addCombatLine(rolls[i], table[rolls[i] - 1], head.nextSibling);
          }
        }
      } else if (isCounter) {
        const op = opSelect.value;
        let target = parseInt(condValInput.value, 10);
        if (isNaN(target)) target = 0;
        let hits = 0;
        rolls.forEach(v => { if (passesCondition(v, op, target)) hits++; });

        resultDie.textContent = qty + 'x D' + sides + ' ( ' + op + ' ' + target + ' )';
        resultVal.textContent = hits + ' / ' + qty;
        resultVal.className = 'result-value roll-anim';
        critLabel.className = 'crit-label';
        critLabel.textContent = '';

        const head = addGroupHead(qty + 'x D' + sides + '  (' + op + ' ' + target + ')  →  ' + hits + '/' + qty);
        for (let i = 0; i < rolls.length; i++) {
          addHistoryLine(sides, rolls[i], passesCondition(rolls[i], op, target) ? 'hi' : 'lo', head.nextSibling);
        }
      } else if (qty === 1) {
        const v = rolls[0];
        const crit = getCrit(sides, v);
        resultDie.textContent = 'D' + sides;
        resultVal.textContent = v;
        resultVal.className = 'result-value roll-anim' + (crit ? ' crit-' + crit : '');
        critLabel.className = 'crit-label' + (crit ? ' ' + crit : '');
        critLabel.textContent = critText(crit);
        addHistoryLine(sides, v, crit);
      } else {
        const total = rolls.reduce((a, b) => a + b, 0);
        resultDie.textContent = qty + 'x D' + sides;
        resultVal.textContent = total;
        resultVal.className = 'result-value roll-anim';
        critLabel.className = 'crit-label';
        critLabel.textContent = '';
        const head = addGroupHead(qty + 'x D' + sides + '  →  soma ' + total);
        for (let i = 0; i < rolls.length; i++) {
          addHistoryLine(sides, rolls[i], getCrit(sides, rolls[i]), head.nextSibling);
        }
      }

      setTimeout(() => resultVal.classList.remove('roll-anim'), 120);
    }

    // cria os botões
    DICE.forEach(sides => {
      const btn = document.createElement('button');
      btn.className = 'die-btn';
      btn.dataset.sides = sides;
      btn.textContent = 'D' + sides;
      btn.addEventListener('click', () => roll(sides));
      diceEl.appendChild(btn);
      dieButtons.push(btn);
    });

    clearBtn.addEventListener('click', () => {
      historyEl.innerHTML = '<li class="empty">Nenhuma rolagem ainda.</li>';
      resultDie.textContent = 'Escolha um dado';
      resultVal.textContent = '—';
      resultVal.className = 'result-value';
      critLabel.textContent = '';
      critLabel.className = 'crit-label';
    });

    syncUI();
  });
</script>

</body>
</html>
