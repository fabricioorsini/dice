<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rolador de Dados — RPG</title>
<style>
  :root {
    --bg: #14110f;
    --panel: #1e1a16;
    --panel-2: #26211c;
    --line: #3a322a;
    --txt: #e8ddcc;
    --muted: #9c8d78;
    --accent: #c4622d;
    --accent-2: #d98a3d;
    --crit-hi: #4caf6d;
    --crit-lo: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: radial-gradient(circle at 50% 0%, #221d18 0%, var(--bg) 60%);
    color: var(--txt);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  h1 {
    font-size: 1.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-2);
    margin-bottom: 4px;
    text-align: center;
  }

  .sub {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 1px;
    margin-bottom: 28px;
    text-align: center;
  }

  .grid {
    display: flex;
    flex-direction: column;
    gap: 40px;
    align-items: center;
  }

  .block { width: 640px; }

  .main {
    display: flex;
    gap: 22px;
    width: 100%;
    align-items: flex-start;
  }

  .left-col { flex: 1 1 auto; min-width: 0; }
  .right-col { flex: 0 0 auto; }

  /* Caixa de resultado */
  .result-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    margin-bottom: 18px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4) inset, 0 0 0 1px rgba(0,0,0,0.2);
  }

  .result-die {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
    min-height: 1.1em;
  }

  .result-value {
    font-size: 3rem;
    font-weight: bold;
    line-height: 1;
    color: var(--accent-2);
    transition: transform 0.12s ease;
  }

  .result-value.roll-anim { transform: scale(1.18); }
  .result-value.crit-hi { color: var(--crit-hi); }
  .result-value.crit-lo { color: var(--crit-lo); }

  .crit-label {
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
    min-height: 1em;
  }
  .crit-label.hi { color: var(--crit-hi); }
  .crit-label.lo { color: var(--crit-lo); }

  /* Botões dos dados: 2 fileiras de 4 */
  .dice {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    width: 100%;
  }

  .die-btn {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line);
    color: var(--txt);
    font-family: Georgia, serif;
    font-size: 1.2rem;
    font-weight: bold;
    padding: 10px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.08s ease, border-color 0.2s, background 0.2s;
    letter-spacing: 1px;
  }
  .die-btn:hover {
    border-color: var(--accent);
    background: linear-gradient(180deg, #322a22, var(--panel-2));
  }
  .die-btn:active { transform: translateY(2px) scale(0.97); }

  /* Painel de controles abaixo dos dados */
  .controls {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .ctrl-row label {
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .num-input {
    width: 70px;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--txt);
    font-family: Georgia, serif;
    font-size: 1.1rem;
    font-weight: bold;
    text-align: center;
    padding: 8px 6px;
    border-radius: 6px;
  }
  .num-input:focus { outline: none; border-color: var(--accent); }
  .num-input:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Checkbox "Contador" */
  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .toggle input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .toggle span {
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Linha da condição (operador + valor) */
  .cond-row.disabled { opacity: 0.35; pointer-events: none; }

  .op-select {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--txt);
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1.15rem;
    font-weight: bold;
    text-align: center;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
  .op-select:focus { outline: none; border-color: var(--accent); }
  .op-select:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Histórico */
  .hist-wrap {
    display: flex;
    flex-direction: column;
    width: 210px;
  }

  .hist-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
    margin-bottom: 10px;
  }
  .hist-head h2 {
    font-size: 0.85rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: normal;
  }
  .clear-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 5px;
    cursor: pointer;
    font-family: Georgia, serif;
  }
  .clear-btn:hover { border-color: var(--crit-lo); color: var(--crit-lo); }

  .history {
    list-style: none;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    height: 300px;
    min-height: 90px;
    min-width: 160px;
    overflow: auto;
    resize: both;
    padding: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }
  .history::-webkit-scrollbar { width: 6px; height: 6px; }
  .history::-webkit-scrollbar-track { background: transparent; }
  .history::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
  .history::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  .history::-webkit-scrollbar-corner { background: transparent; }

  .history li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-bottom: 1px solid rgba(58,50,42,0.5);
    font-size: 0.9rem;
  }
  .history li:nth-child(odd) { background: rgba(255,255,255,0.015); }

  /* Cabeçalho de grupo de rolagem no histórico */
  .history li.group-head {
    justify-content: center;
    color: var(--accent);
    font-size: 0.72rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(196,98,45,0.08);
    border-bottom: 1px solid var(--line);
  }

  .h-die { color: var(--muted); letter-spacing: 1px; font-size: 0.85rem; }
  .h-val { font-weight: bold; font-size: 1.05rem; color: var(--accent-2); }
  .h-val.hi { color: var(--crit-hi); }
  .h-val.lo { color: var(--crit-lo); }
  .h-time { color: #6f6253; font-size: 0.7rem; }

  .empty {
    color: #6f6253;
    text-align: center;
    padding: 18px 10px;
    font-style: italic;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

  <h1>Rolador de Dados</h1>
  <div class="sub">Histórico mantido durante a sessão · recarregar limpa tudo</div>

  <div class="grid">

    <div class="block">
      <div class="main">
        <div class="left-col">
          <div class="result-box">
            <div class="result-die" data-role="resultDie">Escolha um dado</div>
            <div class="result-value" data-role="resultValue">—</div>
            <div class="crit-label" data-role="critLabel"></div>
          </div>

          <div class="dice" data-role="dice"></div>

          <div class="controls">
            <div class="ctrl-row">
              <label for="qty">Qtd. de roladas</label>
              <input type="number" id="qty" class="num-input" data-role="qty" min="1" max="100" value="1">
            </div>

            <div class="ctrl-row">
              <label class="toggle">
                <input type="checkbox" data-role="counterToggle">
                <span>Contador</span>
              </label>
            </div>

            <div class="ctrl-row cond-row disabled" data-role="condRow">
              <label>Condição: dado</label>
              <select class="op-select" data-role="op" disabled>
                <option value="==">==</option>
                <option value="!=">!=</option>
                <option value="&gt;">&gt;</option>
                <option value="&gt;=">&gt;=</option>
                <option value="&lt;" selected>&lt;</option>
                <option value="&lt;=">&lt;=</option>
              </select>
              <input type="number" class="num-input" data-role="condVal" value="5" disabled>
            </div>
          </div>
        </div>

        <div class="right-col">
          <div class="hist-wrap">
            <div class="hist-head">
              <h2>Histórico</h2>
              <button class="clear-btn" data-role="clearBtn">Limpar</button>
            </div>
            <ul class="history" data-role="history">
              <li class="empty">Nenhuma rolagem ainda.</li>
            </ul>
          </div>
        </div>
      </div>
    </div>

  </div>

<script>
  const DICE = [2, 4, 6, 8, 10, 12, 20, 100];

  // Regras de crítico do sistema próprio:
  // D20 -> acerto crítico no 1 (sem erro crítico)
  // D6  -> acerto crítico no 6, erro crítico no 1
  function getCrit(sides, value) {
    if (sides === 20) {
      if (value === 1) return 'hi';
    } else if (sides === 6) {
      if (value === 6) return 'hi';
      if (value === 1) return 'lo';
    }
    return null;
  }

  function critText(crit) {
    return crit === 'hi' ? 'Acerto Crítico!' : crit === 'lo' ? 'Falha Crítica!' : '';
  }

  // Avalia a condição como um IF (operadores estilo C#)
  function passesCondition(value, op, target) {
    switch (op) {
      case '==': return value === target;
      case '!=': return value !== target;
      case '>':  return value >  target;
      case '>=': return value >= target;
      case '<':  return value <  target;
      case '<=': return value <= target;
      default:   return false;
    }
  }

  function nowTime() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  document.querySelectorAll('.block').forEach(block => {
    const diceEl       = block.querySelector('[data-role="dice"]');
    const resultDie    = block.querySelector('[data-role="resultDie"]');
    const resultVal    = block.querySelector('[data-role="resultValue"]');
    const critLabel    = block.querySelector('[data-role="critLabel"]');
    const historyEl    = block.querySelector('[data-role="history"]');
    const clearBtn     = block.querySelector('[data-role="clearBtn"]');
    const qtyInput     = block.querySelector('[data-role="qty"]');
    const counterTgl   = block.querySelector('[data-role="counterToggle"]');
    const condRow      = block.querySelector('[data-role="condRow"]');
    const opSelect     = block.querySelector('[data-role="op"]');
    const condValInput = block.querySelector('[data-role="condVal"]');

    function clearEmptyMsg() {
      const empty = historyEl.querySelector('.empty');
      if (empty) empty.remove();
    }

    // Liga/desliga os controles de condição conforme o modo contador
    function syncCounterUI() {
      const on = counterTgl.checked;
      opSelect.disabled = !on;
      condValInput.disabled = !on;
      condRow.classList.toggle('disabled', !on);
    }
    counterTgl.addEventListener('change', syncCounterUI);
    syncCounterUI();

    function readQty() {
      let qty = parseInt(qtyInput.value, 10);
      if (isNaN(qty) || qty < 1) qty = 1;
      if (qty > 100) qty = 100;
      qtyInput.value = qty;
      return qty;
    }

    // Adiciona um cabeçalho de grupo (ex: "10x D20 ( < 5 )")
    function addGroupHead(text) {
      clearEmptyMsg();
      const li = document.createElement('li');
      li.className = 'group-head';
      li.textContent = text;
      historyEl.insertBefore(li, historyEl.firstChild);
      return li;
    }

    // Adiciona uma linha de rolada. `tone` define a cor: 'hi', 'lo' ou null.
    function addHistoryLine(sides, value, tone, beforeNode) {
      clearEmptyMsg();
      const li = document.createElement('li');
      li.innerHTML =
        '<span class="h-die">D' + sides + '</span>' +
        '<span class="h-val' + (tone ? ' ' + tone : '') + '">' + value + '</span>' +
        '<span class="h-time">' + nowTime() + '</span>';
      historyEl.insertBefore(li, beforeNode || historyEl.firstChild);
    }

    function roll(sides) {
      const qty = readQty();
      const isCounter = counterTgl.checked;

      // Gera as roladas
      const rolls = [];
      for (let i = 0; i < qty; i++) {
        rolls.push(Math.floor(Math.random() * sides) + 1);
      }

      if (isCounter) {
        // ---- MODO CONTADOR ----
        const op = opSelect.value;
        let target = parseInt(condValInput.value, 10);
        if (isNaN(target)) target = 0;

        let hits = 0;
        rolls.forEach(v => { if (passesCondition(v, op, target)) hits++; });

        // Mostrador: "Nx D20 ( < 5 )" em cima, "hits / qty" embaixo
        resultDie.textContent = qty + 'x D' + sides + ' ( ' + op + ' ' + target + ' )';
        resultVal.textContent = hits + ' / ' + qty;
        resultVal.className = 'result-value roll-anim';
        critLabel.className = 'crit-label';
        critLabel.textContent = '';

        // Histórico: grupo + cada rolada, verde se passou, vermelho se não
        const head = addGroupHead(qty + 'x D' + sides + '  (' + op + ' ' + target + ')  →  ' + hits + '/' + qty);
        for (let i = 0; i < rolls.length; i++) {
          const tone = passesCondition(rolls[i], op, target) ? 'hi' : 'lo';
          addHistoryLine(sides, rolls[i], tone, head.nextSibling);
        }
      } else if (qty === 1) {
        // ---- 1 ROLADA (rolagem simples) ----
        const value = rolls[0];
        const crit = getCrit(sides, value);
        resultDie.textContent = 'D' + sides;
        resultVal.textContent = value;
        resultVal.className = 'result-value roll-anim' + (crit ? ' crit-' + crit : '');
        critLabel.className = 'crit-label' + (crit ? ' ' + crit : '');
        critLabel.textContent = critText(crit);

        addHistoryLine(sides, value, crit);
      } else {
        // ---- MODO SOMA ----
        const total = rolls.reduce((a, b) => a + b, 0);
        resultDie.textContent = qty + 'x D' + sides;
        resultVal.textContent = total;
        resultVal.className = 'result-value roll-anim';
        critLabel.className = 'crit-label';
        critLabel.textContent = '';

        const head = addGroupHead(qty + 'x D' + sides + '  →  soma ' + total);
        for (let i = 0; i < rolls.length; i++) {
          addHistoryLine(sides, rolls[i], getCrit(sides, rolls[i]), head.nextSibling);
        }
      }

      setTimeout(() => resultVal.classList.remove('roll-anim'), 120);
    }

    // Cria os botões dos dados
    DICE.forEach(sides => {
      const btn = document.createElement('button');
      btn.className = 'die-btn';
      btn.textContent = 'D' + sides;
      btn.addEventListener('click', () => roll(sides));
      diceEl.appendChild(btn);
    });

    clearBtn.addEventListener('click', () => {
      historyEl.innerHTML = '<li class="empty">Nenhuma rolagem ainda.</li>';
      resultDie.textContent = 'Escolha um dado';
      resultVal.textContent = '—';
      resultVal.className = 'result-value';
      critLabel.textContent = '';
      critLabel.className = 'crit-label';
    });
  });
</script>

</body>
</html>
